<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Contact Us</h1>
    <p class="subtitle">Fill out the form below and we'll get back to you.</p>

    <div id="success-banner" class="success-banner hidden" role="alert">
      ✅ Message sent successfully! We'll be in touch soon.
    </div>

    <form id="contact-form" novalidate>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Jane Doe"
          autocomplete="name"
        />
        <span class="error" id="name-error" aria-live="polite"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="jane@example.com"
          autocomplete="email"
        />
        <span class="error" id="email-error" aria-live="polite"></span>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          rows="5"
          placeholder="Write your message here..."
        ></textarea>
        <span class="error" id="message-error" aria-live="polite"></span>
      </div>

      <button type="submit" id="submit-btn">Send Message</button>

    </form>
  </div>

  <script src="validate.js"></script>
</body>
</html>
